name: Build XMRig Windows

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows MSVC x64)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: xmrig

      - name: Checkout xmrig-deps
        uses: actions/checkout@v4
        with:
          repository: xmrig/xmrig-deps
          path: xmrig-deps

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S xmrig -B xmrig\build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DWITH_RANDOMX=OFF ^
            -DXMRIG_DEPS="${{ github.workspace }}\xmrig-deps\msvc2022\x64"

      - name: Build Release
        shell: cmd
        run: cmake --build xmrig\build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows-x64-${{ github.sha }}
          path: xmrig\build\Release\xmrig.exe
          retention-days: 30
