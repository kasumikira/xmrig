name: Build XMRig Windows

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows MSVC x64)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache xmrig-deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\deps
          key: xmrig-deps-msvc2022-x64-v1

      - name: Download xmrig-deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $depsDir = "${{ github.workspace }}\deps"
          $zipPath = "${{ github.workspace }}\xmrig-deps.zip"

          $url = "https://github.com/xmrig/xmrig-deps/releases/download/v6.1/xmrig-deps-6.1-win64-msvc2022.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath

          Expand-Archive -Path $zipPath -DestinationPath "${{ github.workspace }}\deps-tmp"

          Get-ChildItem "${{ github.workspace }}\deps-tmp" | Move-Item -Destination $depsDir
          Remove-Item $zipPath

      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DXMRIG_DEPS="${{ github.workspace }}\deps\msvc2022\x64"

      - name: Build Release
        shell: cmd
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows-x64-${{ github.sha }}
          path: build\Release\xmrig.exe
          retention-days: 30
